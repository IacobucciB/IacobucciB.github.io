<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js"></script>

<body>
  <div id="map-container">
    <div id="map"></div>
    <button id="animateButton">&gt;</button>

  <div class="card">Explora las universidades más famosas de cada continente con nuestro mapa interactivo. Usa los botones para pasar entre ellas y descubre su excelencia académica y diversidad cultural. ¡Sumérgete en el conocimiento global con solo unos clics!</div>
